services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=4
        -c max_replication_slots=4
        -c shared_buffers=256MB
        -c max_connections=200
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c effective_cache_size=768MB
        -c random_page_cost=1.1
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2gb
        reservations:
          memory: 512mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s

  debezium:
    image: debezium/connect:2.5
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PCI Zone: Internal services (no host port mapping) ──────────────────

  card-vault-service:
    build:
      context: ./card-vault-service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/card_vault
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      VAULT_ENCRYPTION_KEY_FILE: /run/secrets/vault_encryption_key
      SPRING_PROFILES_ACTIVE: docker
    secrets:
      - vault_encryption_key
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  token-service:
    build:
      context: ./token-service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/token_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: docker
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  card-auth-service:
    build:
      context: ./card-auth-service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      card-vault-service:
        condition: service_started
      token-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/card_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      GATEWAY_SERVER_URL: http://external-payment-gateway:8081
      GATEWAY_CALLBACK_URL: http://acquirer-core-backend:8080/v1/webhooks/gateway
      TOKEN_SERVICE_URL: http://token-service:8084
      VAULT_SERVICE_URL: http://card-vault-service:8086
      SPRING_PROFILES_ACTIVE: docker
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  # ── Non-PCI Zone: External-facing services ──────────────────────────────

  merchant-service:
    build:
      context: ./merchant-service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/merchant_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: docker
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  acquirer-core-backend:
    build:
      context: ./acquirer-core-backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      card-vault-service:
        condition: service_started
      token-service:
        condition: service_started
      card-auth-service:
        condition: service_started
      merchant-service:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/acquirer_core
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      GATEWAY_SERVER_URL: http://external-payment-gateway:8081
      GATEWAY_CALLBACK_URL: http://acquirer-core-backend:8080/v1/webhooks/gateway
      GATEWAY_WEBHOOK_SECRET: payment-gateway-webhook-secret-2026
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      VAULT_SERVICE_URL: http://card-vault-service:8086
      TOKEN_SERVICE_URL: http://token-service:8084
      AUTH_SERVICE_URL: http://card-auth-service:8085
      MERCHANT_SERVICE_URL: http://merchant-service:8087
      SPRING_PROFILES_ACTIVE: docker
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  external-payment-gateway:
    build:
      context: ./external-payment-gateway
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      GATEWAY_WEBHOOK_SECRET: payment-gateway-webhook-secret-2026
      SPRING_PROFILES_ACTIVE: docker
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  ledger-service:
    build:
      context: ./ledger-service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ledger
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_PROFILES_ACTIVE: docker
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  register-connector:
    image: curlimages/curl:latest
    depends_on:
      debezium:
        condition: service_healthy
      acquirer-core-backend:
        condition: service_started
    restart: "no"
    entrypoint: >
      sh -c '
        echo "Waiting for Debezium Connect to be ready...";
        sleep 10;
        curl -f -X POST http://debezium:8083/connectors \
          -H "Content-Type: application/json" \
          -d @/config/connector.json;
        echo "";
        echo "Connector registered successfully";
      '
    volumes:
      - ./infra/debezium-connector.json:/config/connector.json:ro

  # ── Monitoring Stack ─────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - cadvisor

  grafana:
    image: grafana/grafana:10.4.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - "8089:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  prometheus-data:

secrets:
  db_password:
    file: ./infra/secrets/db_password.txt
  webhook_secret:
    file: ./infra/secrets/webhook_secret.txt
  vault_encryption_key:
    file: ./infra/secrets/vault_encryption_key.txt
