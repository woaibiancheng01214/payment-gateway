server.port=8086
spring.datasource.url=jdbc:postgresql://localhost:5432/card_vault
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.application.name=card-vault-service
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# AES-256 encryption key (64 hex chars = 32 bytes) — override via env var in production
vault.encryption.key=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
