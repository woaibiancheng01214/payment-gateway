# Tomcat thread pool and timeout tuning
server.port=8086
server.tomcat.connection-timeout=10000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.datasource.url=jdbc:postgresql://localhost:5432/card_vault
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# HikariCP pool tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000

spring.application.name=card-vault-service
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# AES-256 encryption key — use vault.encryption.key-file in production (Docker secrets)
# Local dev fallback only; override via VAULT_ENCRYPTION_KEY_FILE env var in Docker/prod
vault.encryption.key=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
vault.encryption.key-file=
