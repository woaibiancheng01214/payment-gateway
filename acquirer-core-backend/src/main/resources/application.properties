spring.datasource.url=jdbc:postgresql://localhost:5432/acquirer_core
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# HikariCP pool tuning for sustained load (200 concurrent threads: 100 create + 100 confirm)
spring.datasource.hikari.maximum-pool-size=80
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=5000

# Tomcat thread pool and timeout tuning
server.port=8080
server.tomcat.connection-timeout=15000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Gateway RPC server
gateway.server.url=http://localhost:8081
gateway.callback.url=http://localhost:8080/v1/webhooks/gateway

# Payment timeout configuration
# How long to wait for an auth webhook before expiring the intent (seconds)
payment.timeout.auth-seconds=180
# How long to wait for a capture webhook before expiring the capture attempt (seconds)
# Intent stays AUTHORIZED so the merchant can issue a new capture.
payment.timeout.capture-seconds=60
# How often the cleanup scheduler runs (seconds)
payment.cleanup.interval-seconds=10

# Dispatch-retry scheduler: picks up InternalAttempts that were committed
# but never dispatched to the gateway (crash, network error)
payment.dispatch.retry-interval-seconds=3
payment.dispatch.stale-seconds=10

# Webhook HMAC-SHA256 verification (shared secret with external-payment-gateway)
gateway.webhook.secret=payment-gateway-webhook-secret-2026
gateway.webhook.tolerance-seconds=300

# Internal PCI services
vault.service.url=http://localhost:8086
token.service.url=http://localhost:8084
auth.service.url=http://localhost:8085

# Merchant service
merchant.service.url=http://localhost:8087

# Redis — idempotency cache
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000
spring.data.redis.connect-timeout=2000

# Actuator — expose metrics for stress-test monitoring
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

# Application name for logging
spring.application.name=acquirer-core-backend

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
