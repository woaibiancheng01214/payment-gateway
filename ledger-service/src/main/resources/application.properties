server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/ledger
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Kafka consumer config
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=ledger-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Debezium CDC topic for payment_intents table
ledger.kafka.topic=payment-gateway.public.payment_intents

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
