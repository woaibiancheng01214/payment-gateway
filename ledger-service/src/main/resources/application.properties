# Tomcat thread pool and timeout tuning
server.port=8082
server.tomcat.connection-timeout=10000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

spring.datasource.url=jdbc:postgresql://localhost:5432/ledger
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Kafka consumer config
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=ledger-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Concurrent consumers — scales with Kafka partition count (8 partitions, 4 consumers)
spring.kafka.listener.concurrency=4

# Debezium CDC topic for payment_intents table
ledger.kafka.topic=acquirer-core.public.payment_intents

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

spring.application.name=ledger-service
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
