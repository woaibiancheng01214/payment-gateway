# Tomcat thread pool and timeout tuning
server.port=8081
server.tomcat.connection-timeout=10000
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=20
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Exponential webhook delay distribution
# floor: minimum delay before any webhook fires (ms)
# cap:   hard upper bound on delay (ms)
# lambda: rate parameter for the exponential variate (1/scale_ms)
#   With floor=1000, lambda=0.0003 → median ≈ 3.3s, P95 ≈ 11s, P99 ≈ 16s, cap=60s
gateway.delay.floor-ms=1000
gateway.delay.cap-ms=60000
gateway.delay.lambda=0.0003

# Internal retry behaviour (mirrors realistic gateway retry logic)
gateway.retry.max=2

# Probability knobs (integers 1-100, outcomes roll <= threshold)
# AUTH: 70% success, 20% failure, 10% timeout
gateway.auth.success-threshold=70
gateway.auth.failure-threshold=90
# CAPTURE: 90% success, 5% failure, 5% timeout
gateway.capture.success-threshold=90
gateway.capture.failure-threshold=95

# Synchronous ACK latency distribution (before returning HTTP 202)
# Exponential: floor 10ms, cap 2000ms, lambda 0.005 → median ~150ms, P95 ~600ms
gateway.ack.floor-ms=10
gateway.ack.cap-ms=2000
gateway.ack.lambda=0.005

# Webhook HMAC-SHA256 signing secret (shared with acquirer-core-backend)
gateway.webhook.secret=payment-gateway-webhook-secret-2026

# Actuator — expose metrics for stress-test monitoring
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

spring.application.name=external-payment-gateway
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
