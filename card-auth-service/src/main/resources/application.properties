server.port=8085
spring.datasource.url=jdbc:postgresql://localhost:5432/card_auth
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.application.name=card-auth-service
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# External gateway
gateway.server.url=http://localhost:8081
gateway.callback.url=http://localhost:8080/v1/webhooks/gateway

# Token service
token.service.url=http://localhost:8084

# Vault service
vault.service.url=http://localhost:8086

# Scheduler config
payment.timeout.capture-seconds=60
payment.cleanup.interval-seconds=10
payment.cleanup.batch-size=50
payment.dispatch.retry-interval-seconds=3
payment.dispatch.stale-seconds=10
