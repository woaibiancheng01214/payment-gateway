global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Spring Boot services (Micrometer Prometheus endpoint)
  - job_name: "spring-boot"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "acquirer-core-backend:8080"
          - "external-payment-gateway:8081"
          - "ledger-service:8082"
          - "card-vault-service:8086"
          - "token-service:8084"
          - "card-auth-service:8085"
          - "merchant-service:8087"

  # Container metrics via cAdvisor
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # PostgreSQL metrics
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
